<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Members Area — UCOSA-NA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f6f9;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    header {
      background: #1a1a2e;
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header img { width: 48px; height: 48px; object-fit: contain; border-radius: 8px; }
    header .header-text h1 { font-size: 1.25rem; }
    header .header-text p  { font-size: 0.8rem; color: #aab4c8; }
    header .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .btn-logout {
      background: #e63946;
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-logout:hover { background: #c1121f; }

    /* TOP NAV */
    .topnav {
      background: #16213e;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .topnav a {
      color: #cdd6f4;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 0.85rem;
      display: inline-block;
      transition: background 0.2s;
    }
    .topnav a:hover { background: #1a1a2e; color: white; }
    .topnav a.active { background: #1a1a2e; color: white; font-weight: 600; }

    /* LAYOUT */
    .layout {
      display: flex;
      max-width: 1200px;
      margin: 28px auto;
      padding: 0 20px 60px;
      gap: 28px;
      align-items: flex-start;
      flex: 1;
      width: 100%;
    }

    /* SIDEBAR */
    .sidebar {
      width: 200px;
      flex-shrink: 0;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      padding: 20px 0;
      position: sticky;
      top: 16px;
    }
    .sidebar h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #999;
      padding: 0 20px 10px;
      border-bottom: 1px solid #f0f0f0;
      margin-bottom: 8px;
    }
    .sidebar a {
      display: block;
      padding: 9px 20px;
      color: #444;
      text-decoration: none;
      font-size: 0.9rem;
      transition: background 0.15s;
      border-left: 3px solid transparent;
    }
    .sidebar a:hover, .sidebar a.active {
      background: #f0f4ff;
      color: #1a1a2e;
      border-left-color: #1a1a2e;
      font-weight: 600;
    }
    .sidebar .sidebar-admin {
      margin: 16px 20px 4px;
      display: block;
      text-align: center;
      background: #e63946;
      color: white;
      padding: 10px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s;
    }
    .sidebar .sidebar-admin:hover { background: #c1121f; border-left-color: transparent; }

    /* CONTENT */
    .content { flex: 1; min-width: 0; }

    /* PROFILE CARD — centered grid */
    .profile-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 32px 24px 24px;
      margin-bottom: 24px;
      text-align: center;
      border-top: 5px solid #7b2152;
    }
    .profile-card h2 {
      font-size: 1.6rem;
      color: #1a1a2e;
      margin-bottom: 20px;
    }
    .profile-fields {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      max-width: 800px;
      margin: 0 auto 20px;
    }
    .profile-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: #f8f9fc;
      border-radius: 8px;
      padding: 12px 16px;
    }
    .profile-field .lbl {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #999;
      font-weight: 600;
    }
    .profile-field .val {
      font-size: 0.97rem;
      color: #1a1a2e;
      font-weight: 600;
    }
    .profile-edit-btn {
      background: none;
      border: 1px solid #c8a96e;
      color: #7b2152;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .profile-edit-btn:hover { background: #f5ece8; }

    /* EDIT FORM */
    .edit-form { margin-top: 14px; display: none; max-width: 400px; margin-left: auto; margin-right: auto; }
    .edit-form input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #dde3f0;
      border-radius: 6px;
      font-size: 0.9rem;
      margin-bottom: 8px;
      text-align: left;
    }
    .edit-form .edit-actions { display: flex; gap: 8px; justify-content: center; }
    .btn-save {
      background: #7b2152;
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-save:hover { background: #5a1840; }
    .btn-cancel {
      background: #eee;
      color: #555;
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
    }

    /* SECTIONS */
    section {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      padding: 28px 32px;
      margin-bottom: 24px;
    }
    section h2 {
      font-size: 1.2rem;
      color: #1a1a2e;
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: 2px solid #e8ecf4;
    }

    /* FINANCIAL GRID */
    .fin-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }
    .fin-table th {
      background: #7b2152;
      color: white;
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .fin-table th:first-child { border-radius: 8px 0 0 0; }
    .fin-table th:last-child  { border-radius: 0 8px 0 0; }
    .fin-table td {
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
      color: #333;
    }
    .fin-table tr:last-child td { border-bottom: none; }
    .fin-table tr:nth-child(even) td { background: #faf8f5; }
    .fin-table tr:hover td { background: #f5ece8; }
    .fin-paid   { color: #2e7d32; font-weight: 700; }
    .fin-unpaid { color: #c62828; font-weight: 700; }
    .fin-total  { background: #f5ece8 !important; font-weight: 700; color: #7b2152; }
    .fin-empty  { color: #999; font-style: italic; padding: 24px 16px; }

    /* QUICK LINKS */
    .quick-links { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; }
    .quick-link {
      background: #f0f4ff;
      border: 1px solid #dde3f0;
      border-radius: 8px;
      padding: 10px 16px;
      text-decoration: none;
      color: #1a1a2e;
      font-size: 0.88rem;
      font-weight: 600;
      transition: background 0.2s;
    }
    .quick-link:hover { background: #e0e8ff; }
    .quick-link.danger { background: #fff0f0; border-color: #fcc; color: #c1121f; }
    .quick-link.danger:hover { background: #ffe0e0; }

    /* MEETING NOTES TABLE */
    .notes-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }
    .notes-table th {
      background: #7b2152;
      color: white;
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .notes-table th:first-child { border-radius: 8px 0 0 0; }
    .notes-table th:last-child  { border-radius: 0 8px 0 0; }
    .notes-table td {
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
      color: #333;
      vertical-align: middle;
    }
    .notes-table tr:last-child td { border-bottom: none; }
    .notes-table tr:nth-child(even) td { background: #faf8f5; }
    .notes-table tr:hover td { background: #f5ece8; }
    .notes-link {
      color: #7b2152;
      font-weight: 600;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .notes-link:hover { text-decoration: underline; }

    .loading { text-align: center; padding: 60px 20px; color: #888; }

    footer {
      background: #1a1a2e;
      color: #aab4c8;
      text-align: center;
      padding: 16px 20px;
      font-size: 0.8rem;
    }

    @media (max-width: 700px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; position: static; }
      section { padding: 20px 16px; }
      .profile-card { flex-direction: column; }
    }
  </style>
</head>
<body>

  <header>
    <img src="/logo.jpg" alt="UCOSA-NA Logo" />
    <div class="header-text">
      <h1>UCOSA-North America</h1>
      <p>Members Area</p>
    </div>
    <div class="header-right">
      <span id="headerName" style="color:#cdd6f4;font-size:0.85rem;"></span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </header>

  <nav class="topnav">
    <a href="/">Home</a>
    <a href="/members.html" class="active">Members Area</a>
    <a href="/change-password.html">Change Password</a>
  </nav>

  <div class="layout" id="mainLayout" style="display:none;">

    <aside class="sidebar">
      <h3>Members Menu</h3>
      <a href="/members.html" class="active">Dashboard</a>
      <a href="#endowment-section" onclick="document.getElementById('endowment-section').scrollIntoView({behavior:'smooth'})">Endowment Fund</a>
      <a href="#meeting-notes-section" onclick="document.getElementById('meeting-notes-section').scrollIntoView({behavior:'smooth'})">Meeting Notes</a>
      <a href="/change-password.html">Change Password</a>
      <a href="/">Back to Home</a>
      <a id="adminSidebarLink" href="/admin.html" class="sidebar-admin" style="display:none;">Admin Panel</a>
    </aside>

    <main class="content" id="mainContent">
      <div class="loading">Loading your profile…</div>
    </main>

  </div>

  <footer>
    <p>&copy; 2026 UCOSA-North America. All rights reserved.</p>
  </footer>

  <script>
    function logout() {
      localStorage.removeItem('ucosa_token');
      localStorage.removeItem('ucosa_user');
      window.location.href = '/';
    }

    function getInitials(name) {
      if (!name) return '?';
      return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    }

    function fmt(val) {
      const n = parseFloat(val);
      if (!n) return '<span class="fin-unpaid">—</span>';
      return `<span class="fin-paid">$${n.toFixed(2)}</span>`;
    }

    function showEditForm(user) {
      document.getElementById('editForm').style.display = 'block';
      document.getElementById('editBtn').style.display = 'none';
      document.getElementById('editAddress').value = user.address || '';
      document.getElementById('editPhone').value   = user.phone   || '';
    }

    function hideEditForm() {
      document.getElementById('editForm').style.display = 'none';
      document.getElementById('editBtn').style.display = 'inline-block';
    }

    async function saveProfile(userId) {
      const token   = localStorage.getItem('ucosa_token');
      const address = document.getElementById('editAddress').value.trim();
      const phone   = document.getElementById('editPhone').value.trim();
      const res = await fetch('/api/auth/profile', {
        method: 'PUT',
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ address, phone })
      });
      if (res.ok) {
        document.getElementById('fieldAddress').textContent = address || '—';
        document.getElementById('fieldPhone').textContent   = phone   || '—';
        hideEditForm();
      }
    }

    function fmtStatus(status) {
      const map = { paid: '✅ Paid', partial: '⚠️ Partial', unpaid: '❌ Unpaid' };
      return map[status] || status || '—';
    }

    function fmtDeadline(due_date, year) {
      if (due_date) {
        return new Date(due_date).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
      }
      return `Dec 31, ${year}`;
    }

    function buildFinancialTable(records) {
      if (!records || records.length === 0) {
        return `<p class="fin-empty">No financial records on file yet.</p>`;
      }
      let rows = records.map(r => {
        return `<tr>
          <td>${r.full_name || '—'}</td>
          <td><strong>${r.year}</strong></td>
          <td>${fmt(r.annual_dues)}</td>
          <td>${fmtStatus(r.status)}</td>
          <td>${fmtDeadline(r.due_date, r.year)}</td>
          <td>${r.reminder_sent ? '📱 Yes' : '—'}</td>
        </tr>`;
      }).join('');
      return `
        <table class="fin-table">
          <thead>
            <tr>
              <th>Full Name</th>
              <th>Year</th>
              <th>Annual Dues</th>
              <th>Status</th>
              <th>Annual Due Deadline</th>
              <th>Reminder Sent</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function fmtEndowStatus(status) {
      const s = (status || 'paid').toLowerCase();
      const map = {
        paid:    { bg: '#d1fae5', color: '#065f46', label: 'Paid' },
        pending: { bg: '#fff8e1', color: '#7c5700', label: 'Pending' },
        partial: { bg: '#dbeafe', color: '#1e40af', label: 'Partial' },
      };
      const st = map[s] || { bg: '#f0f0f0', color: '#555', label: status };
      return `<span style="display:inline-block;padding:2px 10px;border-radius:12px;font-size:0.82em;font-weight:700;text-transform:uppercase;background:${st.bg};color:${st.color}">${st.label}</span>`;
    }

    function buildEndowmentTable(records) {
      if (!records || records.length === 0) {
        return `<p class="fin-empty">No endowment fund contributions on file yet.</p>`;
      }
      const total = records.reduce((sum, r) => sum + parseFloat(r.amount || 0), 0);
      const rows = records.map(r => {
        const date = r.contribution_date ? new Date(r.contribution_date).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) : '—';
        return `<tr>
          <td>${r.year || '—'}</td>
          <td>${date}</td>
          <td><strong>${fmt(r.amount)}</strong></td>
          <td>${fmtEndowStatus(r.status)}</td>
          <td>${r.payment_method || '—'}</td>
          <td>${r.notes || '—'}</td>
        </tr>`;
      }).join('');
      return `
        <table class="fin-table">
          <thead>
            <tr>
              <th>Year</th>
              <th>Date</th>
              <th>Amount</th>
              <th>Status</th>
              <th>Payment Method</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody>
            ${rows}
            <tr class="fin-total">
              <td colspan="2"><strong>Total</strong></td>
              <td><strong>${fmt(total)}</strong></td>
              <td colspan="3"></td>
            </tr>
          </tbody>
        </table>`;
    }

    async function fetchNoteBlob(id) {
      const token = localStorage.getItem('ucosa_token');
      const res   = await fetch(`/api/meeting-notes/${id}/file`, { headers: { 'Authorization': 'Bearer ' + token } });
      if (!res.ok) { alert('Could not load file. Please try again.'); return null; }
      return res.blob();
    }

    async function openNote(id) {
      const tab   = window.open('', '_blank');
      if (!tab) { alert('Please allow popups to open documents.'); return; }
      const token = localStorage.getItem('ucosa_token');
      const res   = await fetch(`/api/meeting-notes/${id}/view-token`, {
        method: 'POST', headers: { 'Authorization': 'Bearer ' + token }
      });
      if (!res.ok) { tab.close(); alert('Could not open file.'); return; }
      const { token: viewToken } = await res.json();
      tab.location.href = `/api/meeting-notes/${id}/file?token=${viewToken}`;
    }

    async function downloadNote(id, filename) {
      const blob = await fetchNoteBlob(id);
      if (!blob) return;
      const url = URL.createObjectURL(blob);
      const a   = document.createElement('a');
      a.href     = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 10000);
    }

    function buildNotesTable(notes) {
      if (!notes || !notes.length) {
        return `<p style="color:#999;font-style:italic;padding:12px 0;">No meeting notes have been uploaded yet.</p>`;
      }
      const rows = notes.map(n => {
        const date = new Date(n.meeting_date).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        const fn   = n.original_name.replace(/'/g, "\\'");
        return `<tr>
          <td>${date}</td>
          <td><a class="notes-link" href="#" onclick="openNote(${n.id}); return false;">
            &#128196; ${n.title}
          </a></td>
          <td><button onclick="downloadNote(${n.id}, '${fn}')"
            style="background:#c8a96e;color:#fff;border:none;padding:6px 14px;border-radius:6px;font-size:0.82rem;font-weight:700;cursor:pointer;white-space:nowrap;">
            &#11015; Download
          </button></td>
        </tr>`;
      }).join('');
      return `
        <table class="notes-table">
          <thead><tr><th>Date</th><th>Meeting Notes</th><th>Download</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    async function loadProfile() {
      const token = localStorage.getItem('ucosa_token');
      if (!token) { window.location.href = '/login.html'; return; }

      try {
        const [meRes, finRes, notesRes, endowRes] = await Promise.all([
          fetch('/api/auth/me',             { headers: { 'Authorization': 'Bearer ' + token } }),
          fetch('/api/member/financials',   { headers: { 'Authorization': 'Bearer ' + token } }),
          fetch('/api/meeting-notes',       { headers: { 'Authorization': 'Bearer ' + token } }),
          fetch('/api/member/endowment',    { headers: { 'Authorization': 'Bearer ' + token } }),
        ]);

        if (meRes.status === 401 || meRes.status === 403) { logout(); return; }

        const user         = await meRes.json();
        const records      = finRes.ok   ? await finRes.json()   : [];
        const notes        = notesRes.ok ? await notesRes.json() : [];
        const endowRecords = endowRes.ok ? await endowRes.json() : [];

        if (user.mustChangePassword) {
          window.location.href = '/change-password.html?required=1';
          return;
        }

        localStorage.setItem('ucosa_user', JSON.stringify(user));
        document.getElementById('headerName').textContent = user.fullName;
        if (['admin', 'fin-role', 'security-role'].includes(user.role)) {
          document.getElementById('adminSidebarLink').style.display = 'block';
        }

        const content = document.getElementById('mainContent');
        content.innerHTML = `
          <!-- PROFILE CARD -->
          <div class="profile-card">
            <h2>${user.fullName}</h2>
            <div class="profile-fields">
              <div class="profile-field">
                <span class="lbl">Address</span>
                <span class="val" id="fieldAddress">${user.address || '—'}</span>
              </div>
              <div class="profile-field">
                <span class="lbl">Email</span>
                <span class="val">${user.email}</span>
              </div>
              <div class="profile-field">
                <span class="lbl">Phone</span>
                <span class="val" id="fieldPhone">${user.phone || '—'}</span>
              </div>
              <div class="profile-field">
                <span class="lbl">Member Since</span>
                <span class="val">${user.yearJoined || '—'}</span>
              </div>
            </div>
            <button class="profile-edit-btn" id="editBtn" onclick="showEditForm(${JSON.stringify(user).replace(/"/g,'&quot;')})">&#9998; Edit Contact Info</button>
            <div class="edit-form" id="editForm">
              <input id="editAddress" type="text" placeholder="Address" />
              <input id="editPhone"   type="text" placeholder="Phone number" />
              <div class="edit-actions" style="justify-content:center;">
                <button class="btn-save" onclick="saveProfile(${user.id})">Save</button>
                <button class="btn-cancel" onclick="hideEditForm()">Cancel</button>
              </div>
            </div>
          </div>

          <!-- FINANCIAL RECORDS -->
          <section>
            <h2>&#128181; Financial Records</h2>
            ${buildFinancialTable(records)}
          </section>

          <!-- ENDOWMENT FUND -->
          <section id="endowment-section">
            <h2>&#127381; Endowment Fund</h2>
            ${buildEndowmentTable(endowRecords)}
          </section>

          <!-- MEETING NOTES -->
          <section id="meeting-notes-section">
            <h2>&#128203; Meeting Notes</h2>
            ${buildNotesTable(notes)}
          </section>

          <!-- QUICK ACTIONS -->
          <section>
            <h2>Quick Actions</h2>
            <div class="quick-links">
              <a href="/change-password.html" class="quick-link">&#128274; Change Password</a>
              <a href="/" class="quick-link">&#127968; Back to Home</a>
              ${['admin','fin-role','security-role'].includes(user.role) ? '<a href="/admin.html" class="quick-link" style="background:#fef2f2;border-color:#fcc;color:#c1121f;">&#9881; Admin Panel</a>' : ''}
              <a href="#" class="quick-link danger" onclick="logout(); return false;">&#x2192; Logout</a>
            </div>
          </section>
        `;

        document.getElementById('mainLayout').style.display = 'flex';

      } catch (err) {
        document.getElementById('mainContent').innerHTML = `
          <section>
            <h2>Error Loading Profile</h2>
            <p style="color:#e63946;">Unable to load your profile. Please <a href="/login.html">log in again</a>.</p>
          </section>`;
        document.getElementById('mainLayout').style.display = 'flex';
      }
    }

    loadProfile();
  </script>
</body>
</html>
