<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Members Area — UCOSA-NA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f6f9;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    header {
      background: #1a1a2e;
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header img { width: 48px; height: 48px; object-fit: contain; border-radius: 8px; }
    header .header-text h1 { font-size: 1.25rem; }
    header .header-text p  { font-size: 0.8rem; color: #aab4c8; }
    header .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .btn-logout {
      background: #e63946;
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-logout:hover { background: #c1121f; }

    /* TOP NAV */
    .topnav {
      background: #16213e;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .topnav a {
      color: #cdd6f4;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 0.85rem;
      display: inline-block;
      transition: background 0.2s;
    }
    .topnav a:hover { background: #1a1a2e; color: white; }
    .topnav a.active { background: #1a1a2e; color: white; font-weight: 600; }

    /* LAYOUT */
    .layout {
      display: flex;
      max-width: 1200px;
      margin: 28px auto;
      padding: 0 20px 60px;
      gap: 28px;
      align-items: flex-start;
      flex: 1;
      width: 100%;
    }

    /* SIDEBAR */
    .sidebar {
      width: 200px;
      flex-shrink: 0;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      padding: 20px 0;
      position: sticky;
      top: 16px;
    }
    .sidebar h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #999;
      padding: 0 20px 10px;
      border-bottom: 1px solid #f0f0f0;
      margin-bottom: 8px;
    }
    .sidebar a {
      display: block;
      padding: 9px 20px;
      color: #444;
      text-decoration: none;
      font-size: 0.9rem;
      transition: background 0.15s;
      border-left: 3px solid transparent;
    }
    .sidebar a:hover, .sidebar a.active {
      background: #f0f4ff;
      color: #1a1a2e;
      border-left-color: #1a1a2e;
      font-weight: 600;
    }
    .sidebar .sidebar-admin {
      margin: 16px 20px 4px;
      display: block;
      text-align: center;
      background: #e63946;
      color: white;
      padding: 10px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s;
    }
    .sidebar .sidebar-admin:hover { background: #c1121f; border-left-color: transparent; }

    /* CONTENT */
    .content { flex: 1; min-width: 0; }

    /* PROFILE CARD — top right */
    .profile-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 20px 24px;
      margin-bottom: 24px;
      display: flex;
      align-items: flex-start;
      gap: 20px;
      border-left: 5px solid #7b2152;
    }
    .profile-avatar {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #7b2152, #c8a96e);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }
    .profile-info { flex: 1; }
    .profile-info h2 {
      font-size: 1.4rem;
      color: #1a1a2e;
      margin-bottom: 12px;
    }
    .profile-fields {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
    }
    .profile-field { display: flex; flex-direction: column; gap: 2px; }
    .profile-field .lbl {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #999;
      font-weight: 600;
    }
    .profile-field .val {
      font-size: 0.95rem;
      color: #1a1a2e;
      font-weight: 600;
    }
    .profile-edit-btn {
      background: none;
      border: 1px solid #c8a96e;
      color: #7b2152;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 14px;
      transition: background 0.2s;
    }
    .profile-edit-btn:hover { background: #f5ece8; }

    /* EDIT FORM */
    .edit-form { margin-top: 14px; display: none; }
    .edit-form input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #dde3f0;
      border-radius: 6px;
      font-size: 0.9rem;
      margin-bottom: 8px;
    }
    .edit-form .edit-actions { display: flex; gap: 8px; }
    .btn-save {
      background: #7b2152;
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-save:hover { background: #5a1840; }
    .btn-cancel {
      background: #eee;
      color: #555;
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
    }

    /* SECTIONS */
    section {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      padding: 28px 32px;
      margin-bottom: 24px;
    }
    section h2 {
      font-size: 1.2rem;
      color: #1a1a2e;
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: 2px solid #e8ecf4;
    }

    /* FINANCIAL GRID */
    .fin-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }
    .fin-table th {
      background: #7b2152;
      color: white;
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .fin-table th:first-child { border-radius: 8px 0 0 0; }
    .fin-table th:last-child  { border-radius: 0 8px 0 0; }
    .fin-table td {
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
      color: #333;
    }
    .fin-table tr:last-child td { border-bottom: none; }
    .fin-table tr:nth-child(even) td { background: #faf8f5; }
    .fin-table tr:hover td { background: #f5ece8; }
    .fin-paid   { color: #2e7d32; font-weight: 700; }
    .fin-unpaid { color: #c62828; font-weight: 700; }
    .fin-total  { background: #f5ece8 !important; font-weight: 700; color: #7b2152; }
    .fin-empty  { color: #999; font-style: italic; padding: 24px 16px; }

    /* QUICK LINKS */
    .quick-links { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; }
    .quick-link {
      background: #f0f4ff;
      border: 1px solid #dde3f0;
      border-radius: 8px;
      padding: 10px 16px;
      text-decoration: none;
      color: #1a1a2e;
      font-size: 0.88rem;
      font-weight: 600;
      transition: background 0.2s;
    }
    .quick-link:hover { background: #e0e8ff; }
    .quick-link.danger { background: #fff0f0; border-color: #fcc; color: #c1121f; }
    .quick-link.danger:hover { background: #ffe0e0; }

    .loading { text-align: center; padding: 60px 20px; color: #888; }

    footer {
      background: #1a1a2e;
      color: #aab4c8;
      text-align: center;
      padding: 16px 20px;
      font-size: 0.8rem;
    }

    @media (max-width: 700px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; position: static; }
      section { padding: 20px 16px; }
      .profile-card { flex-direction: column; }
    }
  </style>
</head>
<body>

  <header>
    <img src="/logo.jpg" alt="UCOSA-NA Logo" />
    <div class="header-text">
      <h1>UCOSA-North America</h1>
      <p>Members Area</p>
    </div>
    <div class="header-right">
      <span id="headerName" style="color:#cdd6f4;font-size:0.85rem;"></span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </header>

  <nav class="topnav">
    <a href="/">Home</a>
    <a href="/members.html" class="active">Members Area</a>
    <a href="/change-password.html">Change Password</a>
  </nav>

  <div class="layout" id="mainLayout" style="display:none;">

    <aside class="sidebar">
      <h3>Members Menu</h3>
      <a href="/members.html" class="active">Dashboard</a>
      <a href="/change-password.html">Change Password</a>
      <a href="/">Back to Home</a>
      <a id="adminSidebarLink" href="/admin.html" class="sidebar-admin" style="display:none;">Admin Panel</a>
    </aside>

    <main class="content" id="mainContent">
      <div class="loading">Loading your profile…</div>
    </main>

  </div>

  <footer>
    <p>&copy; 2026 UCOSA-North America. All rights reserved.</p>
  </footer>

  <script>
    function logout() {
      localStorage.removeItem('ucosa_token');
      localStorage.removeItem('ucosa_user');
      window.location.href = '/';
    }

    function getInitials(name) {
      if (!name) return '?';
      return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    }

    function fmt(val) {
      const n = parseFloat(val);
      if (!n) return '<span class="fin-unpaid">—</span>';
      return `<span class="fin-paid">$${n.toFixed(2)}</span>`;
    }

    function showEditForm(user) {
      document.getElementById('editForm').style.display = 'block';
      document.getElementById('editBtn').style.display = 'none';
      document.getElementById('editAddress').value = user.address || '';
      document.getElementById('editPhone').value   = user.phone   || '';
    }

    function hideEditForm() {
      document.getElementById('editForm').style.display = 'none';
      document.getElementById('editBtn').style.display = 'inline-block';
    }

    async function saveProfile(userId) {
      const token   = localStorage.getItem('ucosa_token');
      const address = document.getElementById('editAddress').value.trim();
      const phone   = document.getElementById('editPhone').value.trim();
      const res = await fetch('/api/auth/profile', {
        method: 'PUT',
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ address, phone })
      });
      if (res.ok) {
        document.getElementById('fieldAddress').textContent = address || '—';
        document.getElementById('fieldPhone').textContent   = phone   || '—';
        hideEditForm();
      }
    }

    function buildFinancialTable(records) {
      if (!records || records.length === 0) {
        return `<p class="fin-empty">No financial records on file yet.</p>`;
      }
      let totalDues = 0, totalEndow = 0;
      let rows = records.map(r => {
        totalDues  += parseFloat(r.annual_dues)    || 0;
        totalEndow += parseFloat(r.endowment_fund) || 0;
        return `<tr>
          <td><strong>${r.year}</strong></td>
          <td>${fmt(r.annual_dues)}</td>
          <td>${fmt(r.endowment_fund)}</td>
          <td>${r.notes || '—'}</td>
        </tr>`;
      }).join('');
      return `
        <table class="fin-table">
          <thead>
            <tr>
              <th>Year</th>
              <th>Annual Dues</th>
              <th>Endowment Fund</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody>
            ${rows}
            <tr>
              <td class="fin-total">Total</td>
              <td class="fin-total">$${totalDues.toFixed(2)}</td>
              <td class="fin-total">$${totalEndow.toFixed(2)}</td>
              <td class="fin-total"></td>
            </tr>
          </tbody>
        </table>`;
    }

    async function loadProfile() {
      const token = localStorage.getItem('ucosa_token');
      if (!token) { window.location.href = '/login.html'; return; }

      try {
        const [meRes, finRes] = await Promise.all([
          fetch('/api/auth/me',           { headers: { 'Authorization': 'Bearer ' + token } }),
          fetch('/api/member/financials', { headers: { 'Authorization': 'Bearer ' + token } }),
        ]);

        if (meRes.status === 401 || meRes.status === 403) { logout(); return; }

        const user    = await meRes.json();
        const records = finRes.ok ? await finRes.json() : [];

        if (user.mustChangePassword) {
          window.location.href = '/change-password.html?required=1';
          return;
        }

        localStorage.setItem('ucosa_user', JSON.stringify(user));
        document.getElementById('headerName').textContent = user.fullName;
        if (['admin', 'fin-role', 'security-role'].includes(user.role)) {
          document.getElementById('adminSidebarLink').style.display = 'block';
        }

        const content = document.getElementById('mainContent');
        content.innerHTML = `
          <!-- PROFILE CARD -->
          <div class="profile-card">
            <div class="profile-avatar">${getInitials(user.fullName)}</div>
            <div class="profile-info">
              <h2>${user.fullName}</h2>
              <div class="profile-fields">
                <div class="profile-field">
                  <span class="lbl">Email</span>
                  <span class="val">${user.email}</span>
                </div>
                <div class="profile-field">
                  <span class="lbl">Phone</span>
                  <span class="val" id="fieldPhone">${user.phone || '—'}</span>
                </div>
                <div class="profile-field">
                  <span class="lbl">Address</span>
                  <span class="val" id="fieldAddress">${user.address || '—'}</span>
                </div>
                <div class="profile-field">
                  <span class="lbl">Year Joined</span>
                  <span class="val">${user.yearJoined || '—'}</span>
                </div>
                <div class="profile-field">
                  <span class="lbl">Year of Graduation</span>
                  <span class="val">${user.graduationYear || '—'}</span>
                </div>
                <div class="profile-field">
                  <span class="lbl">Role</span>
                  <span class="val">${user.role}</span>
                </div>
              </div>
              <button class="profile-edit-btn" id="editBtn" onclick="showEditForm(${JSON.stringify(user).replace(/"/g,'&quot;')})">&#9998; Edit Contact Info</button>
              <div class="edit-form" id="editForm">
                <input id="editAddress" type="text" placeholder="Address" />
                <input id="editPhone"   type="text" placeholder="Phone number" />
                <div class="edit-actions">
                  <button class="btn-save" onclick="saveProfile(${user.id})">Save</button>
                  <button class="btn-cancel" onclick="hideEditForm()">Cancel</button>
                </div>
              </div>
            </div>
          </div>

          <!-- FINANCIAL RECORDS -->
          <section>
            <h2>&#128181; Financial Records</h2>
            ${buildFinancialTable(records)}
          </section>

          <!-- QUICK ACTIONS -->
          <section>
            <h2>Quick Actions</h2>
            <div class="quick-links">
              <a href="/change-password.html" class="quick-link">&#128274; Change Password</a>
              <a href="/" class="quick-link">&#127968; Back to Home</a>
              ${['admin','fin-role','security-role'].includes(user.role) ? '<a href="/admin.html" class="quick-link" style="background:#fef2f2;border-color:#fcc;color:#c1121f;">&#9881; Admin Panel</a>' : ''}
              <a href="#" class="quick-link danger" onclick="logout(); return false;">&#x2192; Logout</a>
            </div>
          </section>
        `;

        document.getElementById('mainLayout').style.display = 'flex';

      } catch (err) {
        document.getElementById('mainContent').innerHTML = `
          <section>
            <h2>Error Loading Profile</h2>
            <p style="color:#e63946;">Unable to load your profile. Please <a href="/login.html">log in again</a>.</p>
          </section>`;
        document.getElementById('mainLayout').style.display = 'flex';
      }
    }

    loadProfile();
  </script>
</body>
</html>
