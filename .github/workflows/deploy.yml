name: Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/ucosa-na
  CONTAINER_NAME: ucosa-na-app

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          no-cache: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e

            # Ensure the app-network exists
            docker network inspect app-network >/dev/null 2>&1 || docker network create app-network

            # Start PostgreSQL if not already running
            if ! docker ps --format '{{.Names}}' | grep -q '^ucosa-postgres$'; then
              echo "Starting PostgreSQL container..."
              docker run -d \
                --name ucosa-postgres \
                --restart unless-stopped \
                --network app-network \
                --env-file /opt/ucosa-na/.env \
                -v ucosa-postgres-data:/var/lib/postgresql/data \
                postgres:16-alpine
              echo "Waiting for PostgreSQL to be ready..."
              sleep 10
            fi

            # Inject secrets into .env on the server
            mkdir -p /opt/ucosa-na
            touch /opt/ucosa-na/.env
            # Update or add each secret
            grep -q "^SENDGRID_API_KEY=" /opt/ucosa-na/.env \
              && sed -i "s|^SENDGRID_API_KEY=.*|SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }}|" /opt/ucosa-na/.env \
              || echo "SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }}" >> /opt/ucosa-na/.env
            grep -q "^EMAIL_USER=" /opt/ucosa-na/.env \
              && sed -i "s|^EMAIL_USER=.*|EMAIL_USER=${{ secrets.EMAIL_USER }}|" /opt/ucosa-na/.env \
              || echo "EMAIL_USER=${{ secrets.EMAIL_USER }}" >> /opt/ucosa-na/.env

            # Deploy app
            cd /opt/ucosa-na
            docker pull ${{ env.IMAGE_NAME }}:latest
            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              --network app-network \
              -p 3000:3000 \
              --env-file /opt/ucosa-na/.env \
              ${{ env.IMAGE_NAME }}:latest
            docker image prune -f
            echo "Deployed ${{ github.sha }} at $(date)"
